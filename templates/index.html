<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="google" content="notranslate">

        <title>Zera-JEJU</title>

        <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We" crossorigin="anonymous" />

        <link rel="stylesheet" href="/static/css/index.css" />

        <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=New+Amsterdam&display=swap" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

        <script src="/static/js/index.js" defer></script>
    </head>

    <body>
        <!-- menu -->
        <nav>
            <div class="nav-title">
                <button onclick="location.href='#selection1'" class="nav-title-button">ZERA-JEJU</button>
            </div>
            <div class="nav-list">
                <div class="nav-content">
                    <!-- <button onclick="location.href='#selection2'" class="nav-button">ZERA</button> -->
                </div>
                <div class="nav-images">
                    <a href="">
                        <img src="/static/img/app_icon.png" alt="app">
                    </a>
                </div>
            </div>
        </nav>

        <!-- main page -->
        <div id="selection1" class="section">
            <h2 class="main-title">
                <span class="main-title-part-top">제라진</span>
                <span class="main-title-part-bottom">제주어</span>
            </h2>

            <img class="main-subtitle" src="/static/img/welcome.png">

            <a href="#selection2">
                <img class="arrow" src="/static/img/arrow.png">
            </a>
        </div>

        <!-- translate page -->
        <div id="selection2" class="section">
            <div class="title-container">
                <h1 class="title">제라진 번역</h1>
            </div>

            <div class="translate-container">
                <div class="button-container">
                    <button class="btn-hover color-9 text" onclick="showTextContainer()" resetBackground(); style="font-size: 28px;">
                        <span class="material-symbols-outlined">chat</span>
                        텍스트
                    </button>
                    <button class="btn-hover color-9 file" onclick="showFileContainer()" changeBackground(); style="font-size: 28px;">
                        <span class="material-symbols-outlined">description</span>
                        문서
                    </button>
                    <button class="btn-hover color-9 file" onclick="showQuizContainer()" changeBackground(); style="font-size: 28px;">
                        <span class="material-symbols-outlined">quiz</span>
                        문제
                    </button>
                </div>

                <!-- text container -->
                <div id="text-container" class="text-area-container">
                    <div class="text-area">
                        <div class="text-area-wrapper">
                            <h2 id="input-label">표준어</h2>
                            <textarea id="input-text" rows="10" placeholder="번역할 내용을 입력하세요"></textarea>
                        </div>

                        <span class="material-symbols-outlined" onclick="swapLanguages()">sync_alt</span>

                        <div class="text-area-wrapper">
                            <h2 id="output-label">제주어</h2>
                            <textarea id="output-text" rows="10" placeholder="번역" readonly></textarea>
                        </div>
                    </div>
                    
                    <div class="button-container">
                        <button class="btn-hover color-9" onclick="translateText()" style="font-size: 25px;">번역</button>
                    </div>
                </div>

                <!-- file container -->
                <div id="file-container" class="file-area-container standby">
                    <label>※ 번역 결과는 TXT 파일 형식으로 다운로드됩니다.</label>

                    <div class="file-area">
                        <div class="file-area-wrapper" onclick="triggerFileInput()">
                            <span class="material-symbols-outlined">attach_file</span>
                            <label>파일 선택 (TXT, PDF)</label>
                            <input type="file" id="file-input" accept=".txt, .pdf" />
                        </div>
                    </div>

                    <label id="file-inform">파일 없음</label>

                    <div class="button-container">
                        <button class="btn-hover color-9" onclick="translateFile()" style="font-size: 25px;">번역</button>
                    </div>
                </div>

                <!-- quiz container -->
                <div id="quiz-container" class="quiz-area-container standby">
                    <div id="quiz-message" class="none"></div>
                    
                    <div class="quiz-area">
                        <!-- 텍스트 엘리먼트 동적 생성 -->
                    </div>

                    <input type="text" id="answer-input" placeholder="정답을 입력하세요...">

                    <div class="button-container">
                        <button class="btn-hover color-9" onclick="nextDialect()" style="font-size: 25px;">확인</button>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
